<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>4MA</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#06080e;color:#a0b0c0;font-family:'Courier New',monospace;height:100vh;overflow:hidden}
    #app{width:100%;height:100%}
    iframe{width:100%;height:100%;border:none}
    #trial-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#1a1a2e;padding:6px 16px;font-size:11px;color:#88aacc;text-align:center;border-bottom:1px solid #2a3050}
    #trial-bar a{color:#00ffcc;text-decoration:underline;cursor:pointer}
    #trial-bar.warn{background:#2a1a10;color:#ffaa66}
    #expired{display:none;position:fixed;inset:0;z-index:999999;background:#06080e;align-items:center;justify-content:center;flex-direction:column;gap:20px;font-family:'Courier New',monospace}
    #expired.show{display:flex}
    #expired h1{color:#00ffcc;font-size:28px;letter-spacing:4px}
    #expired p{color:#667788;font-size:13px;max-width:400px;text-align:center;line-height:1.6}
    #expired .buy-btn{background:#00aacc;color:#000;border:none;padding:14px 40px;font:bold 15px 'Courier New',monospace;border-radius:10px;cursor:pointer;letter-spacing:2px}
    #expired .buy-btn:hover{background:#00ddff}
    #expired input{background:#0a1018;border:1px solid #1a2a3a;color:#a0ccee;padding:10px;border-radius:8px;font:13px 'Courier New',monospace;width:280px;text-align:center}
    #expired .or{color:#334455;font-size:10px}
  </style>
</head>
<body>
  <div id="trial-bar">
    trial: <span id="trial-days">14</span> days left · <a id="buy-link">buy 4MA</a>
  </div>

  <div id="expired">
    <h1>4MA</h1>
    <p>your trial has ended. buy 4MA to keep using it — one payment, yours forever.</p>
    <button class="buy-btn" onclick="window.__TAURI__.shell.open('https://senderpa.github.io/4ma/support')">BUY 4MA</button>
    <span class="or">— or enter your license key —</span>
    <input id="license-input" placeholder="4MA-XXXX-XXXX-XXXX" />
    <button class="buy-btn" style="background:#1a3050;color:#88aacc;font-size:12px;padding:10px 30px" onclick="activateLicense()">ACTIVATE</button>
  </div>

  <div id="app">
    <iframe id="main-frame" src="about:blank"></iframe>
  </div>

  <script type="module">
    const { invoke } = window.__TAURI__?.core || {};

    async function checkTrial() {
      if (!invoke) return; // dev mode without Tauri
      try {
        const status = await invoke('check_trial');
        if (status.licensed) return; // fully licensed

        if (status.expired) {
          document.getElementById('expired').classList.add('show');
          document.getElementById('app').style.display = 'none';
          return;
        }

        // Show trial bar
        const bar = document.getElementById('trial-bar');
        bar.style.display = 'block';
        document.getElementById('trial-days').textContent = status.days_left;
        if (status.days_left <= 3) bar.classList.add('warn');
      } catch (_) {}
    }

    window.activateLicense = async function() {
      const key = document.getElementById('license-input').value.trim();
      if (!key) return;
      try {
        await invoke('activate_license', { key });
        location.reload();
      } catch (e) {
        alert('Invalid key: ' + e);
      }
    };

    // Load the 4MA backend UI
    const frame = document.getElementById('main-frame');
    frame.src = 'http://localhost:5090';

    checkTrial();
  </script>
</body>
</html>
